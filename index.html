<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识层级 · 名词全景</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; overflow: hidden; }
  
  /* 布局 */
  .app { display: flex; flex-direction: column; height: 100vh; }
  
  /* 顶栏 */
  .header { 
    padding: 12px 24px; 
    background: linear-gradient(135deg, #1a1a2e, #16213e); 
    border-bottom: 1px solid #2a2a4a;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #7c7cf0; }
  .header .stats { font-size: 12px; color: #888; }
  
  /* 主体区域 */
  .main { display: flex; flex: 1; overflow: hidden; }
  
  /* 左侧层级面板 */
  .left-panel {
    width: 280px; min-width: 280px;
    background: #151528; border-right: 1px solid #2a2a4a;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-title { 
    padding: 12px 16px; font-size: 13px; font-weight: 600; 
    color: #888; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid #2a2a4a;
  }
  .level-list { flex: 1; overflow-y: auto; padding: 8px; }
  
  .level-item {
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .level-item:hover { background: #1e1e3a; }
  .level-item.active { background: #2a2a5a; border-left: 3px solid #7c7cf0; }
  .level-item .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 20px; border-radius: 4px;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .badge-L0 { background: #ff6b6b; color: #fff; }
  .badge-L1 { background: #ffa94d; color: #000; }
  .badge-L2 { background: #ffd43b; color: #000; }
  .badge-L3 { background: #69db7c; color: #000; }
  .badge-L4 { background: #4dabf7; color: #fff; }
  .badge-L5 { background: #9775fa; color: #fff; }
  .badge-L6 { background: #e599f7; color: #000; }
  .level-item .count { margin-left: auto; font-size: 11px; color: #666; }
  
  /* 右侧内容区 */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  
  /* 时间线 */
  .timeline-section {
    padding: 0 16px; background: #12122a;
    border-bottom: 1px solid #2a2a4a;
  }
  .timeline-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 12px; color: #888;
  }
  .timeline-track {
    position: relative; height: 40px; margin: 4px 0 12px 0;
    cursor: pointer; user-select: none;
  }
  .timeline-bg {
    position: absolute; top: 50%; left: 0; right: 0; height: 4px;
    background: #2a2a4a; border-radius: 2px; transform: translateY(-50%);
  }
  .timeline-range {
    position: absolute; top: 50%; height: 4px;
    background: linear-gradient(90deg, #7c7cf0, #4dabf7);
    border-radius: 2px; transform: translateY(-50%);
    cursor: grab;
  }
  .timeline-range:active { cursor: grabbing; }
  .timeline-handle {
    position: absolute; top: 50%; width: 16px; height: 16px;
    background: #7c7cf0; border: 2px solid #a8a8ff;
    border-radius: 50%; transform: translate(-50%, -50%);
    cursor: ew-resize; z-index: 2;
  }
  .timeline-handle:hover { transform: translate(-50%, -50%) scale(1.2); }
  .timeline-handle.left { left: 0; }
  .timeline-handle.right { right: 0; }
  .timeline-labels {
    position: relative; height: 20px; margin-bottom: 4px;
  }
  .timeline-labels span {
    position: absolute; font-size: 10px; color: #666;
    transform: translateX(-50%);
  }
  
  /* 事件标记点 */
  .event-dot {
    position: absolute; top: 50%; width: 6px; height: 6px;
    background: #f0c040; border-radius: 50%; transform: translate(-50%, -50%);
    z-index: 1; cursor: pointer; transition: all 0.2s;
  }
  .event-dot:hover { width: 10px; height: 10px; background: #ffd700; }
  .event-dot.active { background: #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.6); }
  
  /* 主内容区 - 卡片网格 */
  .card-grid {
    flex: 1; overflow-y: auto; padding: 16px;
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    align-content: start;
  }
  
  .card {
    background: #1a1a30; border: 1px solid #2a2a4a; border-radius: 12px;
    padding: 16px; cursor: pointer; transition: all 0.2s;
  }
  .card:hover { border-color: #4a4a7a; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card.expanded { border-color: #7c7cf0; grid-column: span 1; }
  
  .card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-level { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #2a2a4a; color: #888; }
  .card-year { font-size: 11px; color: #888; margin-left: auto; }
  
  .card-desc { font-size: 12px; color: #999; margin-bottom: 8px; line-height: 1.4; }
  
  .card-dims { display: none; }
  .card.expanded .card-dims { display: block; }
  
  .dim {
    padding: 6px 0; border-bottom: 1px solid #252545; font-size: 13px; line-height: 1.5;
  }
  .dim:last-child { border-bottom: none; }
  .dim-key { color: #7c7cf0; font-weight: 600; font-size: 12px; display: inline; margin-right: 6px; }
  .dim-val { color: #ccc; display: inline; }
  
  /* 空状态 */
  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px;
    color: #555; font-size: 14px;
  }
  
  /* 搜索框 */
  .search-box {
    padding: 8px 16px; border-bottom: 1px solid #2a2a4a;
  }
  .search-box input {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #2a2a4a; background: #1a1a30;
    color: #e0e0e0; font-size: 13px; outline: none;
  }
  .search-box input:focus { border-color: #7c7cf0; }
  .search-box input::placeholder { color: #555; }
  
  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
  
  /* 关系连线SVG */
  .relations-overlay {
    display: none;
  }
  
  /* 标签过滤器 */
  .tag-filters {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 12px;
    border-bottom: 1px solid #2a2a4a;
  }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: #2a2a4a; color: #999; cursor: pointer; transition: all 0.2s;
  }
  .tag:hover { background: #3a3a6a; color: #ccc; }
  .tag.active { background: #7c7cf0; color: #fff; }
  
  @media (max-width: 768px) {
    .left-panel { width: 200px; min-width: 200px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <div class="header">
    <div>
      <h1>📚 名词知识全景</h1>
      <div class="stats">L0 → L6 · 按包含关系分层</div>
    </div>
    <div class="stats" id="statusBar">加载中...</div>
  </div>
  
  <div class="main">
    <!-- 左侧层级面板 -->
    <div class="left-panel">
      <div class="panel-title">📂 层级 (包含关系)</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索名词..." oninput="filterCards()">
      </div>
      <div class="level-list" id="levelList"></div>
    </div>
    
    <!-- 右侧内容区 -->
    <div class="right-panel">
      <!-- 时间线 -->
      <div class="timeline-section">
        <div class="timeline-header">
          <span>⏱ 时间线（拖拽选择时间范围）</span>
          <span id="timeRange">全部时间</span>
        </div>
        <div class="timeline-labels" id="timelineLabels"></div>
        <div class="timeline-track" id="timelineTrack">
          <div class="timeline-bg"></div>
          <div class="timeline-range" id="timelineRange">
            <div class="timeline-handle left" id="handleLeft"></div>
            <div class="timeline-handle right" id="handleRight"></div>
          </div>
        </div>
      </div>
      
      <!-- 标签过滤器 -->
      <div class="tag-filters" id="tagFilters"></div>
      
      <!-- 卡片网格 -->
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </div>
</div>

<script>
// ========== 加载数据 ==========
const DATA = KNOWLEDGE_DATA;

// ========== 工具函数 ==========
function getYearVal(year) {
  if (!year || year === '古代' || year.includes('亿')) return -10000;
  const m = String(year).match(/(\d{4})/);
  return m ? parseInt(m[1]) : -10000;
}

function getAllLeaves(node) {
  const leaves = [];
  if (!node.children || node.children.length === 0) {
    leaves.push(node);
  } else {
    node.children.forEach(c => leaves.push(...getAllLeaves(c)));
  }
  return leaves;
}

function flattenTree(nodes, level = "") {
  const result = [];
  nodes.forEach(n => {
    n._level = level || n.level;
    result.push(n);
    if (n.children) result.push(...flattenTree(n.children, n._level));
  });
  return result;
}

// ========== 主逻辑 ==========
let allItems = [];
let selectedLevels = new Set();
let dataTree = null;

window.onload = function() { init(KNOWLEDGE_DATA); };
function init(data) {
  dataTree = data.tree;
  allItems = flattenTree(dataTree);
  
  // 收集层级
  const levels = new Set();
  allItems.forEach(item => {
    if (item._level) levels.add(item._level);
  });
  
  // 默认选中所有层级
  levels.forEach(l => selectedLevels.add(l));
  
  renderLevels(levels);
  renderTimeline();
  renderTags();
  filterCards();
  setupTimelineDrag();
  
  document.getElementById('statusBar').textContent = 
    `共 ${allItems.length} 个名词 · ${levels.size} 层`;
}

function renderLevels(levels) {
  const list = document.getElementById('levelList');
  const sorted = Array.from(levels).sort();
  
  // 显示层级树
  list.innerHTML = sorted.map(l => {
    const count = allItems.filter(i => i._level === l).length;
    const active = selectedLevels.has(l) ? 'active' : '';
    const levelName = getLevelName(l);
    return `<div class="level-item ${active}" onclick="toggleLevel('${l}')">
      <span class="badge badge-${l}">${l}</span>
      <span style="font-size:13px">${levelName}</span>
      <span class="count">${count}</span>
    </div>`;
  }).join('');
}

function getLevelName(l) {
  const names = {
    'L0': '宇宙/本体',
    'L1': '组成部分',
    'L2': '粒子与场所',
    'L3': '粒子族与力',
    'L4': '具体个体',
    'L5': '细粒度属性',
    'L6': '精确值'
  };
  return names[l] || l;
}

function toggleLevel(level) {
  if (selectedLevels.has(level)) selectedLevels.delete(level);
  else selectedLevels.add(level);
  renderLevels(new Set(allItems.map(i => i._level)));
  filterCards();
}

// ========== 时间线 ==========
let timelineMin = 1800, timelineMax = 2030;
let rangeStart = 1800, rangeEnd = 2030;

function renderTimeline() {
  const track = document.getElementById('timelineTrack');
  const labels = document.getElementById('timelineLabels');
  
  // 计算实际时间范围
  const years = allItems.map(i => getYearVal(i.first_seen)).filter(y => y >= 1000);
  timelineMin = Math.min(...years, 1800);
  timelineMax = Math.max(...years, 2030);
  if (rangeStart < timelineMin) rangeStart = timelineMin;
  if (rangeEnd > timelineMax) rangeEnd = timelineMax;
  
  // 标签
  const step = Math.max(1, Math.round((timelineMax - timelineMin) / 10));
  let labelsHTML = '';
  for (let y = timelineMin; y <= timelineMax; y += step) {
    const pct = ((y - timelineMin) / (timelineMax - timelineMin)) * 100;
    labelsHTML += `<span style="left:${pct}%">${y}</span>`;
  }
  labels.innerHTML = labelsHTML;
  
  // 事件标记
  document.querySelectorAll('.event-dot').forEach(d => d.remove());
  allItems.forEach(item => {
    const y = getYearVal(item.first_seen);
    if (y >= 1000) {
      const pct = ((y - timelineMin) / (timelineMax - timelineMin)) * 100;
      const dot = document.createElement('div');
      dot.className = 'event-dot';
      dot.style.left = pct + '%';
      dot.title = `${item.name} (${item.first_seen})`;
      dot.onclick = (e) => { e.stopPropagation(); filterCards(); };
      track.appendChild(dot);
    }
  });
  
  updateRangeSlider();
}

function updateRangeSlider() {
  const total = timelineMax - timelineMin;
  const left = ((rangeStart - timelineMin) / total) * 100;
  const right = ((timelineMax - rangeEnd) / total) * 100;
  
  const range = document.getElementById('timelineRange');
  range.style.left = left + '%';
  range.style.right = right + '%';
  
  document.getElementById('timeRange').textContent = 
    rangeStart >= 1000 ? `${rangeStart} — ${rangeEnd}` : '全部时间';
  
  filterCards();
}

let dragging = null;

function setupTimelineDrag() {
  const track = document.getElementById('timelineTrack');
  const hL = document.getElementById('handleLeft');
  const hR = document.getElementById('handleRight');
  const range = document.getElementById('timelineRange');
  
  function startDrag(handle, isLeft) {
    return (e) => {
      e.preventDefault();
      dragging = isLeft ? 'left' : 'right';
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', stopDrag);
    };
  }
  
  function onDrag(e) {
    const rect = track.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const year = timelineMin + pct * (timelineMax - timelineMin);
    
    if (dragging === 'left') {
      rangeStart = Math.max(timelineMin, Math.min(year, rangeEnd - 1));
    } else if (dragging === 'right') {
      rangeEnd = Math.min(timelineMax, Math.max(year, rangeStart + 1));
    }
    updateRangeSlider();
  }
  
  function stopDrag() {
    dragging = null;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
  }
  
  // 也可拖拽整个范围
  range.addEventListener('mousedown', (e) => {
    if (e.target === range) {
      dragging = 'range';
      const startYear = rangeStart;
      const startX = e.clientX;
      
      function moveRange(e) {
        const dx = e.clientX - startX;
        const pct = dx / track.offsetWidth;
        const dy = pct * (timelineMax - timelineMin);
        const newStart = startYear + dy;
        const newEnd = newStart + (rangeEnd - rangeStart);
        if (newStart >= timelineMin && newEnd <= timelineMax) {
          rangeStart = newStart;
          rangeEnd = newEnd;
          updateRangeSlider();
        }
      }
      
      function stopRangeDrag() {
        document.removeEventListener('mousemove', moveRange);
        document.removeEventListener('mouseup', stopRangeDrag);
      }
      
      document.addEventListener('mousemove', moveRange);
      document.addEventListener('mouseup', stopRangeDrag);
    }
  });
  
  hL.addEventListener('mousedown', startDrag(hL, true));
  hR.addEventListener('mousedown', startDrag(hR, false));
}

// ========== 标签渲染 ==========
function renderTags() {
  const container = document.getElementById('tagFilters');
  // 从当前选中的层级中提取标签
  const tags = new Set();
  allItems.forEach(item => {
    if (item.dimensions && item.dimensions['命名']) {
      const names = item.dimensions['命名'].split('、').map(s => s.trim());
      names.forEach(n => { if (n.length < 6) tags.add(n); });
    }
  });
  
  const commonTags = Array.from(tags).filter(t => t.length > 0 && t.length < 8).slice(0, 20);
  container.innerHTML = commonTags.map(t => 
    `<span class="tag" onclick="searchTag('${t}')">${t}</span>`
  ).join('');
}

let searchTagActive = '';

function searchTag(tag) {
  searchTagActive = tag;
  document.getElementById('searchInput').value = tag;
  filterCards();
}

// ========== 筛选 + 渲染卡片 ==========
function filterCards() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('cardGrid');
  
  let filtered = allItems.filter(item => {
    // 层级筛选
    if (!selectedLevels.has(item._level)) return false;
    
    // 时间筛选
    const y = getYearVal(item.first_seen);
    if (y >= 1000 && (y < rangeStart || y > rangeEnd)) return false;
    
    // 搜索筛选
    if (query) {
      const nameMatch = item.name.toLowerCase().includes(query);
      const descMatch = item.description && item.description.toLowerCase().includes(query);
      let dimMatch = false;
      if (item.dimensions) {
        for (const [k, v] of Object.entries(item.dimensions)) {
          if (v && v.toLowerCase().includes(query)) { dimMatch = true; break; }
        }
      }
      if (!nameMatch && !descMatch && !dimMatch) return false;
    }
    
    return true;
  });
  
  // 按first_seen时间排序
  filtered.sort((a, b) => getYearVal(a.first_seen) - getYearVal(b.first_seen));
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">🔍 没有匹配的名词<br><small>尝试调整时间范围或层级选择</small></div>';
    return;
  }
  
  grid.innerHTML = filtered.map(item => {
    const level = item._level || 'L0';
    const dims = item.dimensions || {};
    const year = item.first_seen ? item.first_seen.toString() : '';
    const desc = item.description || '';
    
    let dimsHTML = '';
    const dimOrder = ['包含', '量化', '狀態', '功能', '時空', '關係', '命名'];
    // 兼容简繁
    const dimKeys = Object.keys(dims);
    dimOrder.forEach(key => {
      const val = dims[key];
      // 也检查简体
      const simpKey = key === '狀態' ? '状态' : key === '時空' ? '时空' : key === '關係' ? '关系' : key === '命名' ? '命名' : key;
      const actualKey = dimKeys.find(k => k === key || k === simpKey);
      if (actualKey && dims[actualKey]) {
        dimsHTML += `<div class="dim"><span class="dim-key">${key}:</span><span class="dim-val">${dims[actualKey]}</span></div>`;
      }
    });
    
    return `<div class="card" onclick="this.classList.toggle('expanded')">
      <div class="card-header">
        <span class="badge badge-${level}">${level}</span>
        <span class="card-name">${item.name}</span>
        <span class="card-year">${year}</span>
      </div>
      <div class="card-desc">${desc}</div>
      <div class="card-dims">${dimsHTML}</div>
    </div>`;
  }).join('');
}
